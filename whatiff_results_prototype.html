<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatIff — Results Page Prototype (Desktop)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#050506; font-family:'DM Sans',sans-serif; color:#fafafa;
    min-height:100vh; padding:24px 16px 80px; position:relative; overflow-x:hidden;
  }
  /* ---- background effects ---- */
  .bg { position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
  .bg-grad1 { position:absolute; top:-10%; left:-5%; width:50%; height:60%;
    background:radial-gradient(circle, #10b98115, transparent 70%); }
  .bg-grad2 { position:absolute; bottom:-10%; right:-5%; width:55%; height:65%;
    background:radial-gradient(circle, #8b5cf612, transparent 70%); }
  .bg svg { position:absolute; inset:0; width:100%; height:100%; }
  .floatcirc { position:absolute; border-radius:50%; border:1px solid; display:flex;
    align-items:center; justify-content:center; font-size:15px; opacity:.4; }
  .content { position:relative; z-index:1; max-width:1080px; margin:0 auto; }

  .viewtoggle { display:flex; gap:6px; background:#0c0c0e; border:1px solid #1f1f23;
    border-radius:12px; padding:5px; margin:0 auto 28px; width:fit-content; }
  .viewtoggle button { font-family:inherit; font-size:13px; font-weight:600; color:#71717a;
    background:transparent; border:none; padding:9px 18px; border-radius:8px; cursor:pointer; transition:all .15s; }
  .viewtoggle button.on { background:#18181b; color:#fafafa; }

  /* ---- two-column shell ---- */
  .shell { display:grid; grid-template-columns:380px 1fr; gap:32px; align-items:start; }
  @media (max-width:820px){ .shell { grid-template-columns:1fr; } }

  .left { position:sticky; top:24px; }
  .eyebrow { font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
    color:#52525b; margin-bottom:6px; }
  .hero-num { font-size:42px; font-weight:800; color:#10b981; letter-spacing:-0.02em; line-height:1.05; }
  .hero-sub { font-size:13px; color:#a1a1aa; margin-top:5px; margin-bottom:20px; }
  .hero-sub b { color:#fafafa; font-weight:600; }

  /* ---- card stack ---- */
  .cardstack { position:relative; height:280px; }
  .pcard { position:absolute; left:0; width:300px; height:188px; border-radius:18px;
    padding:20px; cursor:pointer; color:#fff; overflow:hidden;
    border:1px solid rgba(255,255,255,.09);
    transition:transform .38s cubic-bezier(.4,0,.2,1), box-shadow .38s; }
  .pcard .chip { width:34px; height:25px; border-radius:5px;
    background:linear-gradient(135deg,#D4A827,#A07D1A); margin-bottom:16px; }
  .pcard .pc-name { font-size:18px; font-weight:700; }
  .pcard .pc-cats { font-size:11.5px; opacity:.82; margin-top:5px; font-weight:500; }
  .pcard .pc-net { position:absolute; bottom:18px; left:20px; font-size:12px; opacity:.9; }
  .pcard .pc-net b { font-size:15px; font-weight:700; }
  .pcard .pc-sheen { position:absolute; inset:0;
    background:linear-gradient(115deg,transparent 40%,rgba(255,255,255,.10) 50%,transparent 60%); pointer-events:none; }
  .swaphint { font-size:12px; color:#52525b; margin-top:6px; }
  .swaphint b { color:#a1a1aa; font-weight:600; }
  .betterline { margin-top:12px; font-size:15px; color:#a1a1aa; line-height:1.4; }
  .betterline b { color:#10b981; font-size:22px; font-weight:800; letter-spacing:-0.01em; }

  /* ---- right column ---- */
  .iconrow { display:flex; gap:10px; margin-bottom:14px; }
  .iconcircle { flex:1; display:flex; flex-direction:column; align-items:center; gap:8px;
    cursor:pointer; background:none; border:none; font-family:inherit; }
  .iconcircle .circ { width:58px; height:58px; border-radius:50%; background:#0c0c0e;
    border:1px solid #27272a; display:flex; align-items:center; justify-content:center;
    font-size:22px; transition:all .18s; color:#d4d4d8; }
  .iconcircle.on .circ { border-color:var(--accent,#10b981); background:#0d1310;
    box-shadow:0 0 0 1px var(--accent,#10b981)33, 0 0 16px var(--accent,#10b981)22; color:var(--accent,#10b981); }
  .iconcircle .lbl { font-size:11px; font-weight:600; color:#71717a; text-align:center; }
  .iconcircle.on .lbl { color:#d4d4d8; }

  .detail { background:#0c0c0e; border:1px solid #1f1f23; border-radius:14px; padding:18px; margin-bottom:16px; }
  .detail-which { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:#52525b; margin-bottom:12px; }
  .detail h4 { font-size:14px; font-weight:700; color:#fafafa; margin-bottom:9px; }
  .item { display:flex; gap:9px; font-size:13.5px; color:#d4d4d8; line-height:1.5; margin-bottom:8px; }
  .item .pl { color:#10b981; font-weight:700; flex-shrink:0; }
  .item .mn { color:#f59e0b; font-weight:700; flex-shrink:0; }
  .item .ck { color:#10b981; font-weight:700; flex-shrink:0; }
  .item .cx { color:#52525b; font-weight:700; flex-shrink:0; }
  .item.off { color:#71717a; }
  .linkbtn { background:none; border:none; color:#8b5cf6; font-family:inherit; font-size:13px;
    font-weight:600; cursor:pointer; padding:6px 0; }
  .hackbox { background:#140d1f; border:1px solid #8b5cf633; border-radius:10px; padding:13px; margin-bottom:10px; }
  .hackbox .ht { color:#8b5cf6; font-weight:700; font-size:13.5px; margin-bottom:5px; }
  .hackbox .hd { color:#a1a1aa; font-size:13px; line-height:1.55; }
  .steps { margin-top:8px; padding-left:2px; }
  .step { display:flex; gap:10px; font-size:13px; color:#d4d4d8; line-height:1.5; margin-bottom:9px; }
  .step .sn { width:20px; height:20px; border-radius:50%; background:#18181b; color:#8b5cf6;
    font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .mathline { display:flex; justify-content:space-between; font-size:13.5px; padding:8px 0; border-bottom:1px solid #18181b; }
  .mathline:last-of-type { border-bottom:none; }
  .mathline .ml-l { color:#a1a1aa; }
  .mathline .ml-r { color:#fafafa; font-weight:600; }
  .mathnote { background:#0a0f14; border:1px solid #06b6d433; border-radius:9px; padding:11px 12px;
    font-size:12.5px; color:#a1a1aa; line-height:1.55; margin-top:12px; }
  .mathnote b { color:#06b6d4; }
  .math-twofig { display:flex; gap:10px; margin-bottom:12px; }
  .math-twofig .mf { flex:1; background:#0a0a0c; border:1px solid #1f1f23; border-radius:10px; padding:11px; }
  .math-twofig .mf-lbl { font-size:10.5px; color:#71717a; text-transform:uppercase; letter-spacing:.04em; }
  .math-twofig .mf-val { font-size:18px; font-weight:700; margin-top:4px; }
  .math-twofig .mf.you .mf-val { color:#10b981; }
  .math-twofig .mf.std .mf-val { color:#d4d4d8; }

  /* ---- lower horizontal tabs ---- */
  .lowtabrow { display:flex; gap:0; border-bottom:1px solid #1f1f23; border-top:1px solid #1f1f23;
    margin-top:20px; padding-top:4px; }
  .lowtabbtn { flex:1; font-family:inherit; background:none; border:none; padding:12px 6px 13px;
    font-size:12px; font-weight:600; color:#71717a; cursor:pointer; text-align:center;
    border-bottom:2px solid transparent; margin-bottom:-1px; transition:color .15s,border-color .15s; line-height:1.3;
    position:relative; }
  .lowtabbtn:not(:last-child)::after { content:''; position:absolute; right:0; top:22%; height:56%;
    width:1px; background:#27272a; }
  .lowtabbtn:hover { color:#a1a1aa; }
  .lowtabbtn.on { color:#fafafa; border-bottom-color:#10b981; }
  .lowcontent { background:#0c0c0e; border:1px solid #1f1f23; border-top:none;
    border-radius:0 0 12px 12px; padding:16px; }
  .lc-item { font-size:13.5px; color:#d4d4d8; line-height:1.5; padding:9px 0; border-bottom:1px solid #18181b;
    display:flex; justify-content:space-between; gap:10px; }
  .lc-item:last-child { border-bottom:none; }
  .lc-name { color:#fafafa; font-weight:600; }
  .lc-val { color:#a1a1aa; flex-shrink:0; }
  .lc-note { font-size:13px; color:#a1a1aa; line-height:1.6; }
  .elig { display:flex; align-items:center; gap:10px; font-size:13.5px; padding:8px 0; border-bottom:1px solid #18181b; }
  .elig:last-child { border-bottom:none; }
  .elig .en { font-size:17px; font-weight:700; width:34px; }
  .elig.yes .en { color:#10b981; }
  .elig.no .en { color:#52525b; }
  .elig .et { color:#d4d4d8; }

  .alt-card { background:#0c0c0e; border:1px solid #8b5cf633; border-radius:12px; padding:15px; margin-bottom:16px; }
  .alt-pill { background:#18181b; color:#8b5cf6; font-size:10px; font-weight:700; text-transform:uppercase;
    letter-spacing:.05em; padding:3px 8px; border-radius:6px; display:inline-block; margin-bottom:9px; }
  .alt-card .ac-line { font-size:13.5px; color:#d4d4d8; line-height:1.55; margin-bottom:10px; }
  .alt-card .ac-line b { color:#fafafa; }

  .note { font-size:11px; color:#3f3f46; text-align:center; margin-top:24px; }
</style>
</head>
<body>
<div class="bg">
  <div class="bg-grad1"></div>
  <div class="bg-grad2"></div>
  <svg preserveAspectRatio="none" viewBox="0 0 1000 600">
    <path d="M0,260 C250,180 400,340 1000,240" stroke="#10b98118" stroke-width="1.5" fill="none"/>
    <path d="M0,360 C300,440 600,300 1000,400" stroke="#8b5cf615" stroke-width="1.5" fill="none"/>
    <path d="M0,160 C400,120 700,260 1000,140" stroke="#06b6d412" stroke-width="1.5" fill="none"/>
  </svg>
  <div class="floatcirc" style="top:12%; right:14%; width:54px; height:54px; border-color:#8b5cf640; color:#8b5cf6;">₹</div>
  <div class="floatcirc" style="top:40%; right:8%; width:48px; height:48px; border-color:#10b98140; color:#10b981;">∑</div>
  <div class="floatcirc" style="top:62%; left:6%; width:50px; height:50px; border-color:#8b5cf640; color:#8b5cf6;">∿</div>
  <div class="floatcirc" style="bottom:10%; left:16%; width:46px; height:46px; border-color:#10b98140; color:#10b981;">↗</div>
</div>

<div class="content">
  <div class="viewtoggle">
    <button id="btn-combo" class="on" onclick="setView('combo')">Combo view</button>
    <button id="btn-single" onclick="setView('single')">Single-card view</button>
  </div>
  <div id="app"></div>
  <div class="note">Prototype · dummy data · two-column desktop layout · tap cards & icons to explore</div>
</div>

<script>
const ISSUER = {
  'Axis':['#7a0f38','#b3185a'], 'SBI':['#1a2f6e','#2d4a9e'], 'Scapia':['#1a1a1a','#f04e23'],
  'HDFC':['#003a6e','#0060b8'], 'ICICI':['#7a1c20','#c23a40'],
};
const PRIORITIES = ['Lounge access','Dining','Cashback','Online shopping','Low forex'];

const DATA = {
  combo: {
    heroNet: 31200,
    cards: [
      { name:'Axis Atlas', issuer:'Axis', cats:'Travel · Dining · International', youValue:18400, stdValue:24000,
        covers:['Lounge access','Dining','Low forex'],
        pros:['5× EDGE Miles on travel spends','1:2 transfer ratio to airline partners','Lounge access from low spend','Strong international acceptance'],
        cons:['₹5,000 annual fee','Milestone benefits need ₹7.5L/yr','EDGE Miles expire in 12 months'],
        hack:{t:'Concentrate travel + dining here', d:'Routing all travel and dining onto this card maximises the 1:2 ratio — worth ~₹6,000/yr more than splitting across cards.',
          steps:['Set Atlas as default for all flight, hotel & dining spends','Skip it for groceries/utilities (low earn there)','Transfer EDGE Miles only when you have an award seat confirmed','Aim past ₹7.5L/yr to unlock milestone bonus miles']},
        math:[['Travel earn (your spend)','₹11,200'],['Dining earn','₹4,800'],['Intl earn','₹2,400'],['Annual fee','−₹5,000']],
        know:['EDGE Miles expire 12 months after earning','Transfer partners change — confirm live before moving','Milestone tiers reset each anniversary year'] },
      { name:'SBI Cashback', issuer:'SBI', cats:'Online · Grocery · Utility', youValue:12800, stdValue:15500,
        covers:['Cashback','Online shopping'],
        pros:['5% cashback on all online spends','Auto-credited, no redemption hassle','Wide online acceptance','No category restrictions online'],
        cons:['₹999 annual fee','1% on offline spends','Utility/rent earn capped'],
        hack:{t:'Make this your online-checkout default', d:'Flat 5% online with no category caps beats most points cards once you value points honestly.',
          steps:['Save SBI Cashback as default on Amazon, Flipkart, etc.','Use it for all online subscriptions','Keep a no-fee card for offline (this earns only 1% there)','Fee waives at ₹2L annual spend — easy to hit if online-heavy']},
        math:[['Online earn (your spend)','₹9,600'],['Grocery earn','₹2,400'],['Utility earn','₹1,800'],['Annual fee','−₹999']],
        know:['Cashback posts in the next statement cycle','Excludes rent, wallet loads & fuel','Fee waiver needs ₹2L annual spend'] },
    ],
  },
  single: {
    heroNet: 23400, betterBy: 14910,
    card: { name:'HDFC Swiggy', issuer:'HDFC', cats:'Online · Dining', youValue:23400, stdValue:28000,
      covers:['Cashback','Online shopping','Dining'],
      pros:['10% cashback on Swiggy orders','5% on other online spends','Free Swiggy One membership','1% everywhere else'],
      cons:['₹500 fee (waived at ₹2L spend)','Cashback paid as Swiggy credits','10% capped at ₹1,500/mo'],
      hack:{t:'Stack with Swiggy One membership', d:'The bundled membership pays for itself in 3–4 orders a month before any cashback is even counted.',
        steps:['Activate the free Swiggy One that comes with the card','Use the card for all Swiggy + Instamart orders','Route other online spends here for the 5%','Watch the ₹1,500/mo cashback cap on Swiggy']},
      math:[['Swiggy earn (your spend)','₹14,400'],['Other online earn','₹9,000'],['Base earn','₹500'],['Annual fee','−₹500 (waived)']],
      know:['Swiggy cashback caps at ₹1,500/month','Credits usable only inside Swiggy app','Fee waiver at ₹2L annual spend'] },
    alt: { name:'ICICI Coral', issuer:'ICICI', youValue:18200, stdValue:21000, less:5200, covers:'Lounge access',
      coversList:['Lounge access'],
      pros:['Railway + airport lounge access','Reward points on all spends','Dining discounts via ICICI program'],
      cons:['Lounge needs ₹50k/quarter spend','Points worth ₹0.25 each'],
      hack:{t:'Hit the quarterly gate with routine bills', d:'Pre-load recurring spend you already pay anyway to clear the ₹50k quarterly gate without spending extra.',
        steps:['Route utility, insurance & recurring bills here','Track quarterly spend toward the ₹50k gate','Lounge unlocks the following quarter once cleared']},
      math:[['Base earn (your spend)','₹4,200'],['Travel earn','₹720'],['Annual fee','−₹500']],
      know:['Lounge access gated on ₹50k/quarter','Reward points value ₹0.25 each','Gate resets every quarter'] },
  },
};

const ICONS = [
  { key:'pros', label:'Pros & cons', icon:'⊕', accent:'#10b981' },
  { key:'hack', label:'Hack', icon:'★', accent:'#8b5cf6' },
  { key:'math', label:'The math', icon:'∑', accent:'#06b6d4' },
  { key:'priorities', label:'Priorities', icon:'◎', accent:'#f59e0b' },
  { key:'know', label:'Things to know', icon:'⚑', accent:'#f59e0b' },
];
const LOWTABS = [
  { key:'fee', label:'Other cards outside your fee preference' },
  { key:'others', label:'Others' },
  { key:'how', label:'How we picked' },
];

let view='combo', activeCard=0, activeIcon=null, activeLowTab=null, showSteps=false, showFullPC=false;

function inr(n){ return '₹'+n.toLocaleString('en-IN'); }
function grad(iss){ const c=ISSUER[iss]||['#27272a','#3f3f46']; return `linear-gradient(150deg,${c[0]},${c[1]})`; }

function stack(cards){
  return cards.map((c,i)=>{
    const front=i===activeCard;
    const tx=front?'translate(0,0) scale(1)':'translate(34px,64px) scale(.93)';
    return `<div class="pcard" style="background:${grad(c.issuer)}; transform:${tx}; z-index:${front?5:2}; box-shadow:${front?'0 14px 36px rgba(0,0,0,.55)':'none'}" onclick="bring(${i})">
      <div class="chip"></div>
      <div class="pc-name">${c.name}</div>
      <div class="pc-cats">${c.cats}</div>
      <div class="pc-net">net for you <b>${inr(c.youValue)}/yr</b></div>
      <div class="pc-sheen"></div></div>`;
  }).join('');
}

function detail(card){
  if(activeIcon===null) return '';
  let inner='';
  if(activeIcon==='pros'){
    if(!showFullPC){
      inner = `<h4>What you gain</h4>`+card.pros.slice(0,3).map(p=>`<div class="item"><span class="pl">+</span><span>${p}</span></div>`).join('')+
        `<h4 style="margin-top:12px">What it costs</h4>`+card.cons.slice(0,2).map(c=>`<div class="item"><span class="mn">−</span><span>${c}</span></div>`).join('')+
        `<button class="linkbtn" onclick="event.stopPropagation(); openFullPC()">See detailed pros &amp; cons →</button>`;
    } else {
      inner = `<h4>All pros</h4>`+card.pros.map(p=>`<div class="item"><span class="pl">+</span><span>${p}</span></div>`).join('')+
        `<h4 style="margin-top:12px">All cons &amp; fine print</h4>`+card.cons.map(c=>`<div class="item"><span class="mn">−</span><span>${c}</span></div>`).join('')+
        `<button class="linkbtn" onclick="event.stopPropagation(); closeFullPC()">← Show less</button>`;
    }
  } else if(activeIcon==='hack'){
    inner = `<div class="hackbox"><div class="ht">★ ${card.hack.t}</div><div class="hd">${card.hack.d}</div></div>`;
    if(!showSteps){
      inner += `<button class="linkbtn" onclick="event.stopPropagation(); openSteps()">See how — steps to execute →</button>`;
    } else {
      inner += `<div class="steps">`+card.hack.steps.map((s,i)=>`<div class="step"><span class="sn">${i+1}</span><span>${s}</span></div>`).join('')+`</div>`+
        `<button class="linkbtn" onclick="event.stopPropagation(); closeSteps()">← Hide steps</button>`;
    }
  } else if(activeIcon==='math'){
    inner = `<div class="math-twofig">
      <div class="mf you"><div class="mf-lbl">For your spend</div><div class="mf-val">${inr(card.youValue)}</div></div>
      <div class="mf std"><div class="mf-lbl">Card on its own</div><div class="mf-val">${inr(card.stdValue)}</div></div></div>`;
    inner += card.math.map(m=>`<div class="mathline"><span class="ml-l">${m[0]}</span><span class="ml-r">${m[1]}</span></div>`).join('');
    inner += `<div class="mathnote"><b>${inr(card.youValue)}</b> is what this card earns on <b>your</b> spending pattern. <b>${inr(card.stdValue)}</b> is its theoretical max if every rupee landed in its best categories. We show your number — the one you'll actually get.</div>`;
  } else if(activeIcon==='priorities'){
    inner = `<h4>Your priorities — what this card covers</h4>`+
      PRIORITIES.map(p=>{ const on=card.covers.includes(p);
        return `<div class="item ${on?'':'off'}"><span class="${on?'ck':'cx'}">${on?'✓':'✗'}</span><span>${p}</span></div>`; }).join('');
  } else if(activeIcon==='know'){
    inner = card.know.map(k=>`<div class="item"><span class="pl">·</span><span>${k}</span></div>`).join('');
  }
  return `<div class="detail"><div class="detail-which">${card.name} · ${card.cats}</div>${inner}</div>`;
}

function iconrow(){
  return `<div class="iconrow">`+ICONS.map(ic=>`
    <button class="iconcircle ${activeIcon===ic.key?'on':''}" style="--accent:${ic.accent}" onclick="setIcon('${ic.key}')">
      <div class="circ">${ic.icon}</div><div class="lbl">${ic.label}</div></button>`).join('')+`</div>`;
}

function lowContent(k){
  if(k==='fee') return `<div class="lc-item"><span class="lc-name">Amex Platinum Travel</span><span class="lc-val">₹5,000 fee</span></div><div class="lc-item"><span class="lc-name">HDFC Regalia Gold</span><span class="lc-val">₹2,500 fee</span></div><div class="lc-note" style="margin-top:10px">Above your fee comfort, but strong value if you'd stretch.</div>`;
  if(k==='others') return `<div class="lc-item"><span class="lc-name">ICICI Amazon Pay</span><span class="lc-val">₹21,300/yr</span></div><div class="lc-item"><span class="lc-name">Axis Ace</span><span class="lc-val">₹19,800/yr</span></div><div class="lc-item"><span class="lc-name">SBI SimplyCLICK</span><span class="lc-val">₹16,400/yr</span></div>`;
  if(k==='how') return `<div class="elig yes"><span class="en">✓29</span><span class="et">eligible for you</span></div><div class="elig no"><span class="en">✕4</span><span class="et">income mismatch</span></div><div class="elig no"><span class="en">✕7</span><span class="et">above your fee comfort</span></div><div class="elig no"><span class="en">✕2</span><span class="et">invite-only</span></div><div class="lc-note" style="margin-top:10px">Ranked by net annual rupee value for your exact spends. No card pays to rank here.</div>`;
  return '';
}
function lowtabs(){
  const row=`<div class="lowtabrow">`+LOWTABS.map(t=>`<button class="lowtabbtn ${activeLowTab===t.key?'on':''}" onclick="setLow('${t.key}')">${t.label}</button>`).join('')+`</div>`;
  return row + (activeLowTab?`<div class="lowcontent">${lowContent(activeLowTab)}</div>`:'');
}

function renderCombo(){
  const d=DATA.combo, c=d.cards[activeCard];
  return `<div class="shell">
    <div class="left">
      <div class="eyebrow">Your best combo · both cards</div>
      <div class="hero-num">${inr(d.heroNet)}/yr</div>
      <div class="hero-sub">combined net benefit across <b>2 cards</b></div>
      <div class="cardstack">${stack(d.cards)}</div>
      <div class="swaphint">Showing <b>${c.name}</b> · tap the other card to swap</div>
    </div>
    <div class="right">${iconrow()}${detail(c)}${lowtabs()}</div>
  </div>`;
}
function renderSingle(){
  const d=DATA.single, c=d.card;
  const alt=`<div class="alt-card"><div class="alt-pill">Alternative for your priority</div>
    <div class="ac-line"><b>${d.alt.name}</b> covers <b>${d.alt.covers}</b> — earns ${inr(d.alt.youValue)}/yr, that's ${inr(d.alt.less)} less than your optimal. Your call.</div>
    <button class="linkbtn" onclick="event.stopPropagation(); alert('In the real build: opens the full alternative-card detail — same pros/cons, hack, math, priorities as the primary.')">See full details →</button></div>`;
  return `<div class="shell">
    <div class="left">
      <div class="eyebrow">Your #1 fit</div>
      <div class="hero-num">${inr(d.heroNet)}/yr</div>
      <div class="hero-sub">annual net benefit · <b>${c.name}</b></div>
      <div class="cardstack" style="height:210px">
        <div class="pcard" style="background:${grad(c.issuer)}; z-index:5; box-shadow:0 14px 36px rgba(0,0,0,.55)">
          <div class="chip"></div><div class="pc-name">${c.name}</div><div class="pc-cats">${c.cats}</div>
          <div class="pc-net">net for you <b>${inr(c.youValue)}/yr</b></div><div class="pc-sheen"></div></div>
      </div>
      <div class="betterline"><b>${inr(d.betterBy)}</b> better/year than an average card you'd qualify for</div>
    </div>
    <div class="right">${iconrow()}${detail(c)}${alt}${lowtabs()}</div>
  </div>`;
}

function render(){ document.getElementById('app').innerHTML = view==='combo'?renderCombo():renderSingle(); }
function setView(v){ view=v; activeCard=0; activeIcon=null; activeLowTab=null; showSteps=false; showFullPC=false;
  document.getElementById('btn-combo').classList.toggle('on',v==='combo');
  document.getElementById('btn-single').classList.toggle('on',v==='single'); render(); }
function bring(i){ activeCard=i; showSteps=false; showFullPC=false; render(); }
function setIcon(k){ activeIcon=(activeIcon===k?null:k); showSteps=false; showFullPC=false; render(); }
function setLow(k){ activeLowTab=(activeLowTab===k?null:k); render(); }
function openSteps(){ showSteps=true; render(); }
function closeSteps(){ showSteps=false; render(); }
function openFullPC(){ showFullPC=true; render(); }
function closeFullPC(){ showFullPC=false; render(); }
render();
</script>
</body>
</html>
